version: "3.9"

services:
  mongo:
    image: mongo:7
    restart: unless-stopped
    volumes:
      - mongo_data:/data/db
    # Bind to localhost only; expose outside via ssh tunnel if needed
    ports:
      - "127.0.0.1:27017:27017"

  backend:
    build:
      context: .
      dockerfile: Dockerfile.backend
    restart: unless-stopped
    depends_on:
      - mongo
    environment:
      MONGO_URL: "mongodb://mongo:27017"
      DB_NAME: "panorama_comms"
      JWT_SECRET: "${JWT_SECRET:-change-me-to-a-random-64-char-hex}"
      ADMIN_EMAIL: "${ADMIN_EMAIL:-operations@panoramacoaches.com.au}"
      ADMIN_PASSWORD: "${ADMIN_PASSWORD:-Pano3666}"
      ADMIN_NAME: "${ADMIN_NAME:-Operations Admin}"
      GIPHY_API_KEY: "${GIPHY_API_KEY:-}"
      TENOR_API_KEY: "${TENOR_API_KEY:-}"
      FRONTEND_URL: "${FRONTEND_URL:-http://localhost}"
      CORS_ORIGINS: "${FRONTEND_URL:-http://localhost}"
      UPLOAD_DIR: "/app/backend/uploads"
      MAX_UPLOAD_MB: "15"
    volumes:
      - uploads_data:/app/backend/uploads
    # Backend is fronted by nginx in the frontend container; no need to expose
    expose:
      - "8001"

  frontend:
    build:
      context: .
      dockerfile: Dockerfile.frontend
      args:
        # For production self-host, same origin is used (nginx proxies /api)
        REACT_APP_BACKEND_URL: "${PUBLIC_URL:-}"
    restart: unless-stopped
    depends_on:
      - backend
    ports:
      - "${WEB_PORT:-80}:80"

volumes:
  mongo_data:
  uploads_data:
